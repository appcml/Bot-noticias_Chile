name: Bot Noticias Chile

on:
  schedule:
    # Corre cada 30 minutos — el bot verifica horario pico y límite diario
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      forzar:
        description: 'Forzar publicación (salta tiempo y horario pico)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema (ffmpeg + espeak)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg espeak espeak-data

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Ejecutar bot
        env:
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
          NEWSDATA_API_KEY:   ${{ secrets.NEWSDATA_API_KEY }}
          GNEWS_API_KEY:      ${{ secrets.GNEWS_API_KEY }}
          FB_PAGE_ID:         ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN:    ${{ secrets.FB_ACCESS_TOKEN }}
          # WordPress (opcional — dejar vacío si no está configurado)
          WP_URL:             ${{ secrets.WP_URL }}
          WP_USER:            ${{ secrets.WP_USER }}
          WP_APP_PASSWORD:    ${{ secrets.WP_APP_PASSWORD }}
          # Historial en raíz del repo
          HISTORIAL_PATH:     data/historial_chile.json
          ESTADO_PATH:        data/estado_bot_chile.json
          # Modo forzado: 'true' solo cuando se activa manualmente con esa opción
          FORZAR_PUBLICACION: ${{ github.event.inputs.forzar || 'false' }}
        run: python bot_noticias_virales.py

      - name: Guardar historial en repositorio
        if: always()
        run: |
          git config user.name  "bot-noticias-chile[bot]"
          git config user.email "bot-noticias-chile@users.noreply.github.com"
          if git diff --quiet data/historial_chile.json data/estado_bot_chile.json 2>/dev/null; then
            echo "ℹ️ Sin cambios en historial"
          else
            git add data/historial_chile.json data/estado_bot_chile.json
            git commit -m "📰 Historial Chile actualizado [skip ci]"
            git push
            echo "✅ Historial guardado"
          fi

      - name: Subir estado como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-chile-state-${{ github.run_number }}
          path: |
            data/historial_chile.json
            data/estado_bot_chile.json
          retention-days: 7
